; PHP local 8.3 - configuracion para Webnu (Laravel 7)
extension_dir = "C:\webproject\Webnu\Webnu\.php-runtime\ext"

; Laravel 7 sobre PHP 8.3 emite muchos E_DEPRECATED por compatibilidad de tipos
; en ArrayAccess / IteratorAggregate. HandleExceptions de Laravel los convierte
; en excepciones fatales si no se silencian aqui.
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT & ~E_NOTICE
display_errors = On
display_startup_errors = Off
log_errors = On

; Extensiones
extension=curl
extension=fileinfo
extension=mbstring
extension=openssl
extension=pdo_mysql
extension=pdo_sqlite
extension=sqlite3
extension=mysqli
extension=gd
extension=zip
extension=exif
extension=intl

; Subida de archivos (carta, logo, escaneo PDF)
upload_max_filesize = 12M
post_max_size = 16M
max_execution_time = 120
max_file_uploads = 20
memory_limit = 256M

; Certificados CA: run-local.ps1 inyecta openssl.cafile y curl.cainfo
