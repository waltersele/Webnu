; PHP local 8.1+ — extensiones para Laravel y escaneo de carta
extension_dir = "C:\xampp\php\ext"
extension=curl
extension=fileinfo
extension=mbstring
extension=openssl
; Certificados CA: run-local.ps1 define openssl.cafile y curl.cainfo con ruta al proyecto
extension=pdo_mysql
extension=pdo_sqlite
extension=mysqli

; Subida de archivos (carta, logo, escaneo PDF)
upload_max_filesize = 12M
post_max_size = 16M
max_execution_time = 120
max_file_uploads = 20
memory_limit = 256M
